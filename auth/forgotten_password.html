  <style>
    :root { --pink: #ff69b4; --pink-dark: #e0459a; --bg: #fff0f5; }
    body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, var(--bg), #ffffff); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; margin: 0; }
    
    .box { background: white; padding: 40px 30px; border-radius: 24px; box-shadow: 0 15px 40px rgba(255,105,180,0.15); width: 100%; max-width: 400px; text-align: center; }
    
    .logo-area { margin-bottom: 20px; }
    .logo-area img { width: 80px; height: 80px; border-radius: 20px; box-shadow: 0 8px 16px rgba(255,105,180,0.2); }

    h2 { color: #2c3e50; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 24px; font-size: 0.9rem; }

    input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 1rem; box-sizing: border-box; }
    input:focus { outline: none; border-color: var(--pink); }

    button { width: 100%; padding: 16px; background: var(--pink); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 16px; }
    button:disabled { background: #ccc; }

    .popup { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 16px 24px; border-radius: 12px; background: white; border-left: 5px solid var(--pink); opacity: 0; transition: all 0.4s; z-index: 1000; }
    .popup.show { opacity: 1; }
  </style>
</head>
  <body>
<div id="app-content">
<div id="app-content">

  <div id="popup" class="popup"></div>

  <div class="box">
    <div class="logo-area">
      <img src="/logo.jpg" alt="Logo">
    </div>
    <h2>Reset Password</h2>
    <p class="subtitle">Enter your email to receive a reset link.</p>
    
    <input type="email" id="email" placeholder="Enter your email" />
    <button id="resetBtn">Send Reset Link</button>
    <p style="margin-top: 20px;"><a href="authlogin.html" style="color: var(--pink-dark); text-decoration: none; font-weight: 600;">Back to Login</a></p>
  </div>

  </div>
<script type="module">
    const supabase = window.supabase;
    const resetBtn = document.getElementById("resetBtn");
    const popup = document.getElementById("popup");

    function showPopup(msg) {
      popup.textContent = msg;
      popup.className = "popup show";
      setTimeout(() => popup.classList.remove("show"), 4000);
    }

    resetBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      if (!email) return showPopup("Please enter your email");

      resetBtn.disabled = true;
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + 'auth/update-password.html'
      });

      if (error) {
        showPopup(error.message);
        resetBtn.disabled = false;
      } else {
        showPopup("Check your email for the reset link!");
      }
    });
  </script>
</body>
