  <style>
    :root { --pink: #ff69b4; --pink-dark: #e0459a; --pink-light: #ffe4f0; --bg: #fff0f5; --text: #333; --gray: #777; }

* {
  -webkit-user-select: none;

    .password-toggle { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--gray); font-size: 1.3rem; }

    .btn-login { width: 100%; padding: 14px; background: var(--pink); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.25s; margin-top: 12px; }

    .btn-login:disabled { background: #ccc; cursor: not-allowed; }

    .error-msg { color: #d32f2f; font-size: 0.9rem; margin-top: 8px; min-height: 1.2em; }

  <body>
<div id="app-content">
<div id="app-content">

  <div class="login-box">
    <div class="logo-container">
      <img src="/logo.jpg" alt="Fastme Logo">
    </div>
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to your Fastme account</p>

    <form id="loginForm">
      <div class="input-group">
        <input type="email" id="email" placeholder="Email" required autocomplete="email" />
      </div>
      <div class="input-group">
        <input type="password" id="password" placeholder="Password" 
        required autocomplete="current-password" />
        <span class="material-icons password-toggle" id="togglePassword">visibility_off</span>
      </div>
      <div class="error-msg" id="errorMsg"></div>
      <button type="submit" class="btn-login" id="loginBtn">Login</button>
      <div class="loader" id="loader"></div>
    </form>

    <div class="links">
      <a href="auth/forgotten_password">Forgot password?</a><br><br>
      Don't have an account? <a href="auth/signup">Sign Up</a>
    </div>
  </div>

  <div id="popup" class="popup"></div>

  </div>
<script type="module">
    const supabase = window.supabase;
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');
    const loginBtn = document.getElementById('loginBtn');
    const loader = document.getElementById('loader');
    const errorMsg = document.getElementById('errorMsg');

    // ✅ CHECK IF USER IS ALREADY LOGGED IN
    async function checkExistingSession() {
      try {
        const { data: { session } } = await supabase.auth.getSession();
        
        if (session) {
          console.log('User already logged in:', session.user.id);
          // Redirect to appropriate page based on role
          redirectBasedOnRole(session);
        }
      } catch (error) {
        console.error('Error checking session:', error);
      }
    }

    // Run session check when page loads
    checkExistingSession();

    togglePassword.addEventListener('click', () => {
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
      togglePassword.textContent = type === 'password' ? 'visibility_off' : 'visibility';
    });

    function showPopup(message, type = 'success') {
      const popup = document.getElementById('popup');
      popup.textContent = message;
      popup.className = `popup ${type} show`;
      setTimeout(() => popup.classList.remove('show'), 4000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginBtn.disabled = true;
      loader.style.display = 'block';
      
      const { data, error } = await supabase.auth.signInWithPassword({
        email: emailInput.value.trim(),
        password: passwordInput.value.trim()
      });

      if (error) {
        errorMsg.textContent = error.message;
        showPopup(error.message, 'error');
        loginBtn.disabled = false;
        loader.style.display = 'none';
      } else {
        showPopup('Login successful!');
        redirectBasedOnRole(data.session);
      }
    });

    async function redirectBasedOnRole(session) {
      const { data: profile } = await supabase
        .from('profiles')
        .select('gender, join_intent')
        .eq('id', session.user.id)
        .maybeSingle();

      console.log('Profile data:', profile);

      // ✅ CORRECTED LOGIC: Check if they're a provider
      // Provider = Woman + Be found by others
      const isProvider = profile?.gender === 'female' && profile?.join_intent === 'be_found';

      console.log('Is Provider:', isProvider, { gender: profile?.gender, intent: profile?.join_intent });

      if (isProvider) {
        console.log('Redirecting to PROVIDER page');
        window.location.replace('/provider/news.html');
      } else {
        console.log('Redirecting to USER page');
        window.location.replace('/user/user_news.html');
      }
    }
  </script>
</body>
