<script type="module">
    const supabase = window.supabase;
    let currentUserId = null;
    let onlineUsers = new Map(); // userId -> { online_at, status }
    const CACHE_DURATION = 5 * 60 * 1000;
    const PROFILE_CACHE_DURATION = 24 * 60 * 60 * 1000;
    let presenceUnsubscribe = null;

    // ════════════════════════════════════════════════
    // UNREAD MESSAGE TRACKING
    // ════════════════════════════════════════════════
    const UnreadManager = {
      getUnreadCount: (userId, chatPartnerId) => {
        try {
          const key = `unread_${[userId, chatPartnerId].sort().join('_')}`;
          return parseInt(localStorage.getItem(key) || '0', 10) || 0;
        } catch {
          return 0;
        }
      },

      setUnreadCount: (userId, chatPartnerId, count) => {
        try {
          const key = `unread_${[userId, chatPartnerId].sort().join('_')}`;
          if (count > 0) {
            localStorage.setItem(key, count.toString());
          } else {
            localStorage.removeItem(key);
          }
          console.log(`[UnreadManager] Set unread for ${chatPartnerId}: ${count}`);
        } catch (e) {
          console.warn('Failed to save unread count:', e);
        }
      },

      getTotalUnread: (userId) => {
        try {
          let total = 0;
          Object.keys(localStorage).forEach(key => {
            if (key.startsWith('unread_')) {
              total += parseInt(localStorage.getItem(key) || '0', 10) || 0;
            }
          });
          console.log(`[UnreadManager] Total unread: ${total}`);
          return total;
        } catch {
          return 0;
        }
      },

      markAsRead: (userId, chatPartnerId) => {
        UnreadManager.setUnreadCount(userId, chatPartnerId, 0);
        console.log(`[UnreadManager] Marked as read: ${chatPartnerId}`);
        updateNavBadge(userId);
      },

      incrementUnread: (userId, chatPartnerId) => {
        const current = UnreadManager.getUnreadCount(userId, chatPartnerId);
        UnreadManager.setUnreadCount(userId, chatPartnerId, current + 1);
      }
    };

    // ════════════════════════════════════════════════
    // CACHE MANAGEMENT
    // ═════════════════════════════════��══════════════
    const CacheManager = {
      getConversations: (userId) => {
        try {
          const cached = localStorage.getItem(`convs_${userId}`);
          const time = localStorage.getItem(`convs_time_${userId}`);
          if (cached && time && Date.now() - Number(time) < CACHE_DURATION) {
            return JSON.parse(cached);
          }
        } catch (e) {
          console.warn('Cache read error:', e);
        }
        return null;
      },

      setConversations: (userId, data) => {
        try {
          localStorage.setItem(`convs_${userId}`, JSON.stringify(data));
          localStorage.setItem(`convs_time_${userId}`, Date.now().toString());
        } catch (e) {
          console.warn('Cache write error:', e);
        }
      },

      getSingleProfile: (userId) => {
        try {
          const cached = localStorage.getItem(`profile_${userId}`);
          const time = localStorage.getItem(`profile_time_${userId}`);
          if (cached && time && Date.now() - Number(time) < PROFILE_CACHE_DURATION) {
            return JSON.parse(cached);
          }
        } catch {}
        return null;
      },

      setSingleProfile: (userId, data) => {
        try {
          localStorage.setItem(`profile_${userId}`, JSON.stringify(data));
          localStorage.setItem(`profile_time_${userId}`, Date.now().toString());
        } catch (e) {
          console.warn('Profile cache write error:', e);
        }
      },

      clearOldCache: () => {
        try {
          Object.keys(localStorage).forEach(key => {
            if (key.endsWith('_time') && !key.startsWith('unread')) {
              const ts = Number(localStorage.getItem(key));
              if (Date.now() - ts > PROFILE_CACHE_DURATION * 2) {
                const base = key.replace('_time', '');
                localStorage.removeItem(base);
                localStorage.removeItem(key);
              }
            }
          });
        } catch {}
      }
    };

    // ════════════════════════════════════════════════
    // UPDATE NAV BADGE
    // ════════════════════════════════════════════════
    function updateNavBadge(userId) {
      const navItem = document.getElementById('chat-nav');
      if (!navItem) {
        console.warn('updateNavBadge: #chat-nav element not found');
        return;
      }

      const total = UnreadManager.getTotalUnread(userId);
      let badge = navItem.querySelector('.nav-badge');

      if (total > 0) {
        if (!badge) {
          badge = document.createElement('div');
          badge.className = 'nav-badge';
          navItem.appendChild(badge);
        }
        badge.textContent = total > 99 ? '99+' : total;
        badge.classList.remove('removing');
        console.log(`[Badge] Updated nav badge: ${total}`);
      } else if (badge) {
        badge.classList.add('removing');
        setTimeout(() => {
          if (badge.parentNode) {
            badge.remove();
            console.log('[Badge] Removed nav badge');
          }
        }, 300);
      }
    }

    // ════════════════════════════════════════════════
    // ONLINE STATUS TRACKING (Presence API)
    // ════════════════════════════════════════════════
    function setupOnlineStatusTracking() {
      console.log('[Presence] Setting up online status tracking');

      const channel = supabase.channel('presence', {
        config: {
          presence: {
            key: currentUserId,
          },
        },
      });

      channel
        .on('presence', { event: 'sync' }, () => {
          const state = channel.presenceState();
          onlineUsers.clear();

          // Process presence state
          Object.keys(state).forEach((presenceKey) => {
            state[presenceKey].forEach((presence) => {
              if (presence.user_id && presence.user_id !== currentUserId) {
                onlineUsers.set(presence.user_id, {
                  status: 'online',
                  online_at: presence.online_at || new Date().toISOString(),
                });
              }
            });
          });

          console.log(`[Presence] Online users: ${onlineUsers.size}`, Array.from(onlineUsers.keys()));

          // Refresh conversation list to update online indicators
          const cached = CacheManager.getConversations(currentUserId);
          if (cached) {
            renderConversationList(cached);
          }
        })
        .on('presence', { event: 'join' }, ({ key, newPresences }) => {
          newPresences.forEach((presence) => {
            if (presence.user_id && presence.user_id !== currentUserId) {
              onlineUsers.set(presence.user_id, {
                status: 'online',
                online_at: presence.online_at || new Date().toISOString(),
              });
              console.log(`[Presence] User came online: ${presence.user_id}`);
              // Update specific chat item
              updateChatItemOnlineStatus(presence.user_id, true);
            }
          });
        })
        .on('presence', { event: 'leave' }, ({ key, leftPresences }) => {
          leftPresences.forEach((presence) => {
            if (presence.user_id) {
              onlineUsers.delete(presence.user_id);
              console.log(`[Presence] User went offline: ${presence.user_id}`);
              // Update specific chat item
              updateChatItemOnlineStatus(presence.user_id, false);
            }
          });
        })
        .subscribe(async (status) => {
          if (status === 'SUBSCRIBED') {
            console.log('[Presence] Subscribed, tracking presence');
            await channel.track({
              user_id: currentUserId,
              online_at: new Date().toISOString(),
            });
          }
        });

      presenceUnsubscribe = () => {
        channel.unsubscribe();
      };
    }

    function updateChatItemOnlineStatus(userId, isOnline) {
      const chatItem = document.querySelector(`[data-user-id="${userId}"]`);
      if (!chatItem) return;

      const existingIndicator = chatItem.querySelector('.online-indicator, .offline-indicator');
      if (existingIndicator) {
        existingIndicator.remove();
      }

      const wrapper = chatItem.querySelector('.avatar-wrapper');
      if (wrapper) {
        if (isOnline) {
          const indicator = document.createElement('div');
          indicator.className = 'online-indicator';
          wrapper.appendChild(indicator);
        } else {
          const indicator = document.createElement('div');
          indicator.className = 'offline-indicator';
          wrapper.appendChild(indicator);
        }
      }

      // Update status text
      const statusEl = chatItem.querySelector('.online-status');
      if (statusEl) {
        if (isOnline) {
          statusEl.textContent = 'Online';
          statusEl.className = 'online-status status-online';
        } else {
          statusEl.textContent = 'Offline';
          statusEl.className = 'online-status status-offline';
        }
      }
    }

    // ════════════════════════════════════════════════
    // CONVERSATION LOADING
    // ════════════════════════════════════════════════
    async function loadConversationListOptimized(userId, useCache = true) {
      if (useCache) {
        const cached = CacheManager.getConversations(userId);
        if (cached && cached.conversations && Object.keys(cached.conversations).length > 0) {
          console.log('✅ Loading from cache');
          renderConversationList(cached);
          refreshConversationsInBackground(userId);
          return;
        }
      }
      await fetchAndRenderConversations(userId);
    }

    async function refreshConversationsInBackground(userId) {
      try {
        await fetchAndRenderConversations(userId);
      } catch (e) {
        console.warn('Background refresh failed:', e);
      }
    }

    async function fetchAndRenderConversations(userId) {
      try {
        console.log('📡 Fetching conversations for user:', userId);

        const { data: messages, error: msgError } = await supabase
          .from('chat_messages')
          .select('id, content, image_url, created_at, from_user, to_user, is_read')
          .or(`from_user.eq.${userId},to_user.eq.${userId}`)
          .order('created_at', { ascending: false })
          .limit(1000);

        if (msgError) {
          console.error('❌ Message fetch error:', msgError);
          throw msgError;
        }

        console.log('📨 Messages fetched:', messages?.length || 0);

        if (!messages?.length) {
          console.log('⚠️ No messages found');
          showEmpty('No conversations yet.\nStart a chat!');
          CacheManager.setConversations(userId, { conversations: {}, profileMap: {}, timestamp: Date.now() });
          return;
        }

        const conversations = {};
        messages.forEach(msg => {
          const otherId = msg.from_user === userId ? msg.to_user : msg.from_user;
          if (!conversations[otherId] || new Date(msg.created_at) > new Date(conversations[otherId].lastTime)) {
            conversations[otherId] = {
              lastMessage: msg.content || '[Image]',
              image_url: msg.image_url,
              lastTime: msg.created_at,
              otherId: otherId,
              isRead: msg.is_read,
              fromUser: msg.from_user
            };
          }
        });

        console.log('✅ Conversations object created:', Object.keys(conversations).length);

        // Calculate unread counts
        const unreadCounts = {};
        Object.keys(conversations).forEach(otherId => {
          const unreadFromThis = messages.filter(msg =>
            msg.to_user === userId &&
            msg.from_user === otherId &&
            !msg.is_read
          ).length;

          if (unreadFromThis > 0) {
            UnreadManager.setUnreadCount(userId, otherId, unreadFromThis);
            unreadCounts[otherId] = unreadFromThis;
          }
        });

        console.log('📊 Unread counts:', unreadCounts);

        const otherIds = Object.keys(conversations);
        console.log('👥 Other user IDs:', otherIds);

        const profileMap = await fetchProfilesOptimized(otherIds);
        console.log('✅ Profiles loaded');

        const data = { conversations, profileMap, timestamp: Date.now() };
        CacheManager.setConversations(userId, data);

        renderConversationList(data);
        updateNavBadge(userId);

      } catch (err) {
        console.error('❌ Fetch conversations failed:', err);
        showEmpty('Could not load conversations.\nPlease check your connection.');
      }
    }

    async function fetchProfilesOptimized(userIds) {
      const profileMap = {};
      const uncached = [];

      userIds.forEach(id => {
        const cached = CacheManager.getSingleProfile(id);
        if (cached) {
          profileMap[id] = cached;
        } else {
          uncached.push(id);
        }
      });

      if (!uncached.length) {
        console.log('✅ All profiles from cache');
        return profileMap;
      }

      console.log('🔄 Fetching profiles for IDs:', uncached);

      try {
        const { data: profiles, error } = await supabase
          .from('profiles')
          .select('id, full_name, avatar_url')
          .in('id', uncached);

        if (error) {
          console.error('Profile fetch error:', error);
          throw error;
        }

        console.log('✅ Profiles fetched:', profiles?.length);

        profiles?.forEach(p => {
          const profile = {
            name: p.full_name || 'User',
            avatar: p.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent((p.full_name || 'U').charAt(0))}&background=ff69b4&color=fff`
          };
          profileMap[p.id] = profile;
          CacheManager.setSingleProfile(p.id, profile);
        });

        uncached.forEach(id => {
          if (!profileMap[id]) {
            profileMap[id] = {
              name: 'User',
              avatar: `https://ui-avatars.com/api/?name=U&background=ff69b4&color=fff`
            };
          }
        });

      } catch (err) {
        console.warn('❌ Profile fetch failed:', err);
        uncached.forEach(id => {
          if (!profileMap[id]) {
            profileMap[id] = {
              name: 'User',
              avatar: `https://ui-avatars.com/api/?name=U&background=ff69b4&color=fff`
            };
          }
        });
      }

      console.log('✅ Profile map complete:', Object.keys(profileMap).length);
      return profileMap;
    }

    // ════════════════════════════════════════════════
    // RENDERING
    // ════════════════════════════════════════════════
    function renderConversationList(data) {
      const container = document.getElementById('chat-list');
      if (!container) {
        console.error('❌ #chat-list container not found!');
        return;
      }

      const { conversations, profileMap } = data;
      console.log('🎨 Rendering conversations:', Object.keys(conversations).length);

      if (!conversations || Object.keys(conversations).length === 0) {
        showEmpty('No conversations yet.\nStart a chat!');
        return;
      }

      const fragment = document.createDocumentFragment();
      const conversationArray = Object.values(conversations)
        .sort((a, b) => new Date(b.lastTime) - new Date(a.lastTime));

      console.log('📋 Sorted array length:', conversationArray.length);

      conversationArray.forEach((conv, index) => {
        try {
          const profile = profileMap[conv.otherId] || { name: 'User', avatar: '' };
          const { name = 'User', avatar = '' } = profile;
          const time = formatTime(conv.lastTime);
          const unreadCount = UnreadManager.getUnreadCount(currentUserId, conv.otherId);
          const isOnline = onlineUsers.has(conv.otherId);

          console.log(`[${index}] Rendering ${conv.otherId}: ${name}, unread: ${unreadCount}, online: ${isOnline}`);

          const item = document.createElement('div');
          item.className = `chat-item ${unreadCount > 0 ? 'unread' : ''}`;
          item.dataset.userId = conv.otherId;

          const defaultAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(name.charAt(0) || 'U')}&background=ff69b4&color=fff`;
          const finalAvatar = avatar && avatar.trim() ? avatar : defaultAvatar;

          const statusIndicator = isOnline
            ? '<div class="online-indicator"></div>'
            : '<div class="offline-indicator"></div>';

          const unreadBadgeHtml = unreadCount > 0
            ? `<div class="unread-badge">${unreadCount > 99 ? '99+' : unreadCount}</div>`
            : '';

          item.innerHTML = `
            <div class="avatar-wrapper">
              <img class="avatar" src="${finalAvatar}" alt="${escapeHtml(name)}"
                   loading="lazy" onerror="this.src='${defaultAvatar}'" />
              ${statusIndicator}
              ${unreadBadgeHtml}
            </div>
            <div class="chat-info">
              <h3>${escapeHtml(name)}</h3>
              <p>${escapeHtml((conv.lastMessage || '—').substring(0, 60))}</p>
            </div>
            <div class="chat-meta">
              <div class="chat-time">${time}</div>
              <div class="online-status ${isOnline ? 'status-online' : 'status-offline'}">
                ${isOnline ? 'Online' : 'Offline'}
              </div>
            </div>
          `;

          item.addEventListener('click', () => {
            console.log(`🎯 Opening chat with ${conv.otherId} (${name})`);

            // Mark as read in UI immediately
            UnreadManager.markAsRead(currentUserId, conv.otherId);

            // Remove badge with animation
            const badge = item.querySelector('.unread-badge');
            if (badge) {
              badge.classList.add('removing');
              setTimeout(() => {
                if (badge.parentNode) {
                  badge.remove();
                }
              }, 300);
            }

            // Remove unread class
            item.classList.remove('unread');

            // Update nav badge
            updateNavBadge(currentUserId);

            // Mark as read in database
            markMessagesAsRead(currentUserId, conv.otherId);

            // Navigate to chat
            window.location.href = `/user/user_chat.html?with=${conv.otherId}&name=${encodeURIComponent(name)}`;

          }, { passive: true });

          fragment.appendChild(item);
        } catch (itemErr) {
          console.error(`❌ Error rendering item ${index}:`, itemErr);
        }
      });

      console.log('✅ Fragment built with:', fragment.children.length, 'items');

      container.innerHTML = '';
      container.appendChild(fragment);

      console.log('✅ Render complete! DOM has', container.children.length, 'items');

      if (container.children.length === 0) {
        showEmpty('No conversations found');
      }
    }

    // ════════════════════════════════════════════════
    // MARK MESSAGES AS READ IN DATABASE
    // ════════════════════════════════════════════════
    async function markMessagesAsRead(userId, chatPartnerId) {
      try {
        const { error } = await supabase
          .from('chat_messages')
          .update({ is_read: true })
          .eq('to_user', userId)
          .eq('from_user', chatPartnerId)
          .eq('is_read', false);

        if (error) {
          console.error('Failed to mark messages as read:', error);
          return;
        }

        console.log(`✅ Marked messages as read for ${chatPartnerId}`);
      } catch (err) {
        console.error('Error marking as read:', err);
      }
    }

    // ════════════════════════════════════════════════
    // REALTIME UPDATES
    // ════════════════════════════════════════════════
    function setupRealtimeSubscription() {
      supabase
        .channel('chat_list_updates')
        .on(
          'postgres_changes',
          { event: 'INSERT', schema: 'public', table: 'chat_messages' },
          (payload) => {
            const msg = payload.new;
            if (msg.from_user === currentUserId || msg.to_user === currentUserId) {
              console.log('[Realtime] New message:', msg);

              if (msg.to_user === currentUserId && !msg.is_read) {
                const otherId = msg.from_user;
                UnreadManager.incrementUnread(currentUserId, otherId);
              }

              // Refresh conversations
              localStorage.removeItem(`convs_${currentUserId}`);
              localStorage.removeItem(`convs_time_${currentUserId}`);
              loadConversationListOptimized(currentUserId, false);
              updateNavBadge(currentUserId);
            }
          }
        )
        .on(
          'postgres_changes',
          { event: 'UPDATE', schema: 'public', table: 'chat_messages' },
          (payload) => {
            const msg = payload.new;
            console.log('[Realtime] Message updated:', msg);

            // If message was marked as read
            if (msg.is_read && (msg.from_user === currentUserId || msg.to_user === currentUserId)) {
              // Refresh to update unread counts
              localStorage.removeItem(`convs_${currentUserId}`);
              localStorage.removeItem(`convs_time_${currentUserId}`);
              loadConversationListOptimized(currentUserId, false);
              updateNavBadge(currentUserId);
            }
          }
        )
        .subscribe();
    }

    // ════════════════════════════════════════════════
    // HELPERS
    // ════════════════════════════════════════════════
    function formatTime(iso) {
      try {
        const d = new Date(iso);
        const now = new Date();
        const days = Math.floor((now - d) / 86400000);
        if (days === 0) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        if (days === 1) return 'Yesterday';
        if (days < 7) return d.toLocaleDateString([], { weekday: 'short' });
        return d.toLocaleDateString([], { day: 'numeric', month: 'short' });
      } catch {
        return 'Now';
      }
    }

    function showEmpty(text) {
      const container = document.getElementById('chat-list');
      if (container) {
        container.innerHTML = `
          <div class="empty-state">
            <span class="material-icons">chat_bubble_outline</span>
            <p>${text.split('\n').join('<br>')}</p>
          </div>
        `;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    // ════════════════════════════════════════════════
    // INITIALIZATION
    // ════════════════════════════════════════════════
    async function init() {
      try {
        console.log('🚀 Initializing chat list...');

        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
          console.warn('No session, redirecting to login');
          window.location.href = '/index.html';
          return;
        }

        currentUserId = session.user.id;
        console.log('👤 Current user ID:', currentUserId);

        CacheManager.clearOldCache();

        if (document.readyState !== 'complete' && document.readyState !== 'interactive') {
          await new Promise(r => {
            document.addEventListener('DOMContentLoaded', r, { once: true });
          });
        }

        console.log('📱 DOM ready, updating badge and loading conversations');
        updateNavBadge(currentUserId);
        await loadConversationListOptimized(currentUserId, true);
        setupRealtimeSubscription();
        setupOnlineStatusTracking();

        setInterval(() => {
          if (document.visibilityState === 'visible') {
            console.log('🔄 Periodic refresh triggered');
            loadConversationListOptimized(currentUserId, false);
          }
        }, 30000);

      } catch (err) {
        console.error('❌ Init failed:', err);
        showEmpty('Error loading chats.\nPlease try again.');
      }
    }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && currentUserId) {
        console.log('👁️ Page became visible - refreshing');
        loadConversationListOptimized(currentUserId, false);
      }
    });

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      if (presenceUnsubscribe) {
        presenceUnsubscribe();
      }
    });

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>

  <script>
// ════════════════════════════════════════════════
// SEARCH FUNCTIONALITY
// ════════════════════════════════════════════════
const searchBtn = document.getElementById("search-btn");
const searchBox = document.getElementById("search-box");
const searchInput = document.getElementById("search-input");
const headerTitle = document.getElementById("header-title");
const searchResults = document.getElementById("search-results");
const chatList = document.getElementById("chat-list");

let searchOpen = false;

function renderSearchResults(results) {
  if (!results || results.length === 0) {
    searchResults.innerHTML = `
      <div class="empty-state">
        <span class="material-icons">person_search</span>
        <p>No users found</p>
      </div>
    `;
    return;
  }

  let html = '<div class="feature-list"><div style="font-weight:600;padding:10px 0;border-bottom:1px solid #ddd;margin-bottom:10px;">Features:</div>';
  html += '<div>🟢 Show online users</div>';
  html += '<div>💬 Show last message in chat</div>';
  html += '<div>⚡ Automatic badge removal</div>';
  html += '</div>';

  results.forEach(user => {
    const avatar = user.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent((user.full_name || 'U').charAt(0))}&background=ff69b4&color=fff`;
    html += `
      <div class="search-result-item" data-user-id="${user.id}">
        <img class="search-result-avatar" src="${avatar}" alt="${escapeHtml(user.full_name)}" onerror="this.src='https://ui-avatars.com/api/?name=U&background=ff69b4&color=fff'" />
        <div class="search-result-info">
          <h3>${escapeHtml(user.full_name || 'User')}</h3>
          <p>${escapeHtml(user.full_name || 'No bio')}</p>
        </div>
      </div>
    `;
  });

  searchResults.innerHTML = html;

  document.querySelectorAll('.search-result-item').forEach(item => {
    item.addEventListener('click', () => {
      const userId = item.dataset.userId;
      const userName = item.querySelector('h3').textContent;

      console.log(`🎯 Opening chat from search: ${userId}`);

      searchOpen = false;
      searchBox.style.display = "none";
      headerTitle.style.display = "block";
      chatList.style.display = "block";
      searchResults.style.display = "none";
      searchInput.value = "";

      window.location.href = `/user/user_chat.html?with=${userId}&name=${encodeURIComponent(userName)}`;
    });
  });
}

searchBtn.addEventListener("click", () => {
  searchOpen = !searchOpen;

  if (searchOpen) {
    searchBox.style.display = "block";
    headerTitle.style.display = "none";
    searchInput.focus();
    chatList.style.display = "none";
    searchResults.style.display = "block";
    searchResults.innerHTML = `
      <div class="feature-list">
        <div style="font-weight:600;padding:10px 0;">✨ Features:</div>
        <div>🟢 Show online users</div>
        <div>💬 Show last message in chat</div>
        <div>⚡ Automatic badge removal</div>
      </div>
      <p style='padding:10px 16px; color:#888;'>Start typing to search users...</p>
    `;
  } else {
    searchBox.style.display = "none";
    headerTitle.style.display = "block";
    chatList.style.display = "block";
    searchResults.style.display = "none";
    searchInput.value = "";
  }
});

searchInput.addEventListener("input", async () => {
  const query = searchInput.value.trim();

  if (!query) {
    searchResults.innerHTML = `
      <div class="feature-list">
        <div style="font-weight:600;padding:10px 0;">✨ Features:</div>
        <div>🟢 Show online users</div>
        <div>💬 Show last message in chat</div>
        <div>⚡ Automatic badge removal</div>
      </div>
      <p style='padding:10px 16px; color:#888;'>Start typing to search users...</p>
    `;
    return;
  }

  try {
    const { data, error } = await window.supabase
      .from("profiles")
      .select("id, full_name, avatar_url")
      .ilike("full_name", `%${query}%`)
      .limit(20);

    if (error) throw error;

    renderSearchResults(data);

  } catch (err) {
    console.error(err);
    searchResults.innerHTML = "<p style='padding:10px;'>Error searching users</p>";
  }
});

  </script>
