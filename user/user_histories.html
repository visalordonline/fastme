<script type="module">
    const supabase = window.supabase;
    const historyList = document.getElementById('history-list');

    async function checkAuthAndLoad() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.replace('/auth/login.html');

        return;
      }
      const userId = session.user.id;
      await loadHistory(userId);
    }

    async function loadHistory(userId) {
      const { data: bookings, error } = await supabase
        .from('bookings')
        .select(`
          id,
          provider_id,
          status,
          type,
          created_at,
          updated_at,
          profiles!provider_id (full_name, avatar_url, account_type)
        `)
        .eq('user_id', userId)
        .order('created_at', { ascending: false });

      if (error) {
        console.error('History error:', error);
        historyList.innerHTML = `
          <p style="color:#e0459a; text-align:center; padding:60px;">
            Error loading history – please try again later
          </p>`;
        return;
      }

      if (!bookings?.length) {
        historyList.innerHTML = `
          <div class="empty-state">
            <p>No bookings yet 💔<br>Make a request and it'll appear here!</p>
          </div>`;
        return;
      }

      let html = '';
      for (const b of bookings) {
        const provider = b.profiles || {};
        const name = provider.full_name || 'Unknown Provider';
        const avatar = provider.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=ff69b4&color=fff`;
        const role = provider.account_type || '—';
        const roleClass = role === 'Hookup' ? 'role-hookup' : role === 'TB' ? 'role-tb' : '';

        const statusLower = b.status?.toLowerCase() || 'pending';
        const statusText = statusLower.charAt(0).toUpperCase() + statusLower.slice(1);
        const statusClass = `status-${statusLower}`;

        // Determine which actions to show
        const canRebook = ['rejected', 'cancelled', 'cancelled_by_user', 'completed'].includes(statusLower);
        const canDelete = true; // always allow delete in history

        let actionItems = '';

        if (canRebook) {
          actionItems += `
            <button class="dropdown-item btn-rebook" onclick="rebook('${b.provider_id}', '${b.type || ''}')">
              🔄 Rebook
            </button>
          `;
        }

        if (canDelete) {
          if (actionItems) actionItems += `<div class="dropdown-divider"></div>`;
          actionItems += `
            <button class="dropdown-item btn-delete" onclick="deleteBooking('${b.id}')">
              🗑️ Delete
            </button>
          `;
        }

        html += `
          <div class="history-card">
            <img class="history-avatar" src="${avatar}" alt="${name}"
                 onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(name.slice(0,2))}&background=ff69b4&color=fff'" />
            <div class="history-content">
              <h3>
                ${name}
                ${role ? `<span class="role-badge ${roleClass}">${role}</span>` : ''}
              </h3>
              <p><strong>Requested:</strong> ${new Date(b.created_at).toLocaleString()}</p>
              ${b.updated_at ? `<p><strong>Updated:</strong> ${new Date(b.updated_at).toLocaleString()}</p>` : ''}
              <p><strong>Status:</strong> 
                <span class="status-badge ${statusClass}">${statusText}</span>
              </p>

              ${actionItems ? `
                <div class="dropdown">
                  <button class="dropdown-btn">Actions ▼</button>
                  <div class="dropdown-content">
                    ${actionItems}
                  </div>
                </div>
              ` : ''}
            </div>
          </div>
        `;
      }

      historyList.innerHTML = html;

      // Dropdown behavior
      document.querySelectorAll('.dropdown').forEach(dropdown => {
        const btn = dropdown.querySelector('.dropdown-btn');
        const content = dropdown.querySelector('.dropdown-content');

        btn.onclick = (e) => {
          e.stopPropagation();
          document.querySelectorAll('.dropdown-content').forEach(c => {
            if (c !== content) c.style.display = 'none';
          });
          content.style.display = content.style.display === 'block' ? 'none' : 'block';
        };

        document.addEventListener('click', (e) => {
          if (!dropdown.contains(e.target)) {
            content.style.display = 'none';
          }
        });
      });
    }

    // ── Delete booking ──────────────────────────────────────────────
    window.deleteBooking = async (bookingId) => {
      if (!confirm("Delete this booking from history?\nThis cannot be undone.")) return;

      const { error } = await supabase
        .from('bookings')
        .delete()
        .eq('id', bookingId);

      if (error) {
        alert("Could not delete booking: " + error.message);
      } else {
        alert("Booking deleted from history.");
        checkAuthAndLoad(); // refresh list
      }
    };

    // ── Rebook same provider ────────────────────────────────────────
    window.rebook = async (providerId, type = '') => {
      if (!confirm("Send a new booking request to this provider?")) return;

      const { data: { session } } = await supabase.auth.getSession();
      const userId = session.user.id;

      // Optional: get current user location if you want to include it
      let lat = null, lng = null;
      try {
        const { data: profile } = await supabase.from('profiles')
          .select('latitude, longitude')
          .eq('id', userId)
          .maybeSingle();
        if (profile?.latitude && profile?.longitude) {
          lat = profile.latitude;
          lng = profile.longitude;
        }
      } catch (e) {}

      const { error } = await supabase
        .from('bookings')
        .insert({
          user_id: userId,
          provider_id: providerId,
          status: 'pending',
          type: type || 'Booking', // reuse type if existed
          user_latitude: lat,
          user_longitude: lng,
          created_at: new Date().toISOString()
        });

      if (error) {
        alert("Failed to send rebook request: " + error.message);
      } else {
        alert("New booking request sent! Check your Requests tab.");
        // Optionally redirect to dashboard
        // window.location.href = '/user/user-dashboard.html';
      }
    };

    checkAuthAndLoad();
    window.addEventListener('focus', () => checkAuthAndLoad());
  </script>
