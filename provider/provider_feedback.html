<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Send Feedback - Fastme</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

</div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

window.supabase = createClient(
'https://bwugvwbkuynncfdgwqyg.supabase.co',
'your-anon-key',
{ auth: { persistSession:true } }
);
</script>

<style>

body{
font-family:'Poppins',sans-serif;
background:#fff0f5;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

h2{
text-align:center;
color:#e0459a;
margin-bottom:20px;
}

textarea{
width:100%;
min-height:120px;
resize:vertical;
padding:12px;
border-radius:10px;
border:2px solid #ffe4f0;
font-family:'Poppins';
font-size:14px;
outline:none;
}

textarea:focus{
border-color:#ff69b4;
}

.char-count{
text-align:right;
font-size:12px;
margin-top:6px;
color:#777;
}

button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#ff69b4;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#e0459a;
}

.success{
text-align:center;
color:green;
margin-top:12px;
display:none;
}

</style>
</head>

  <body>
<div id="app-content">
<div id="app-content">

<div class="container">

<h2>Send Feedback</h2>

<textarea id="feedbackMessage" maxlength="1000"
placeholder="Tell us what you think about Fastme..."></textarea>

<div class="char-count">
<span id="count">0</span>/1000
</div>

<button id="sendFeedback">Submit Feedback</button>

<div class="success" id="successMsg">
Thank you! Your feedback was sent.
</div>

</div>


</div>
<script type="module">

const supabase = window.supabase;

const textarea = document.getElementById("feedbackMessage");
const count = document.getElementById("count");
const successMsg = document.getElementById("successMsg");
const button = document.getElementById("sendFeedback");

textarea.addEventListener("input",()=>{
count.textContent = textarea.value.length;
});

button.onclick = async ()=>{

const message = textarea.value.trim();

if(!message){
alert("Please write your feedback first.");
return;
}

const { data:{user} } = await supabase.auth.getUser();

if(!user){
alert("Please login first.");
return;
}

button.disabled = true;
button.textContent = "Sending...";

const { error } = await supabase
.from("user_feedback")
.insert({
user_id:user.id,
message:message
});

button.disabled=false;
button.textContent="Submit Feedback";

if(error){
alert("Failed to send feedback");
console.error(error);
return;
}

textarea.value="";
count.textContent=0;
successMsg.style.display="block";

setTimeout(()=>{
successMsg.style.display="none";
},4000);

};

</script>

</body>
</html>
