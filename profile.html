  <script type="module">
    const supabase = window.supabase;

    // Elements
    const els = {
      avatar: document.getElementById('avatar'),
      fullName: document.getElementById('fullName'),
      roleBadge: document.getElementById('roleBadge'),
      displayFullName: document.getElementById('displayFullName'),
      email: document.getElementById('email'),
      phone: document.getElementById('phone'),
      dob: document.getElementById('dob'),
      accountType: document.getElementById('accountType'),
      bioDisplay: document.getElementById('bioDisplay'),
      bioInput: document.getElementById('bioInput'),
      editBioBtn: document.getElementById('editBioBtn'),
      saveBioBtn: document.getElementById('saveBioBtn'),
      cancelBioBtn: document.getElementById('cancelBioBtn'),
      bioEditArea: document.getElementById('bioEditArea'),
      editProfileBtn: document.getElementById('editProfileBtn'),
      saveProfileBtn: document.getElementById('saveProfileBtn'),
      cancelProfileBtn: document.getElementById('cancelProfileBtn'),
      infoSection: document.getElementById('infoSection'),
      editFullName: document.getElementById('editFullName'),
      editPhone: document.getElementById('editPhone'),
      editDob: document.getElementById('editDob'),
      avatarInput: document.getElementById('avatarInput'),
      coverInput: document.getElementById('coverInput')
    };

    let currentUserId = null;

   async function loadProfile() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) return window.location.replace('/login.html');

  currentUserId = session.user.id;
  const user = session.user;

  // Select only columns you KNOW exist – or use safe query
  const { data: profile, error } = await supabase
    .from('profiles')
    .select('full_name, phone, date_of_birth, account_type, bio, avatar_url, email, cover_url')
    .eq('id', currentUserId)
    .single();

  // If query failed (400 or no row), profile will be null
  const fullName = profile?.full_name || user.user_metadata?.full_name || user.email?.split('@')[0] || 'User';
  const avatarUrl = profile?.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(fullName)}&background=ff69b4&color=fff`;
  const coverUrl = profile?.cover_url || 'https://images.unsplash.com/photo-1557683316-973673baf926?w=1200';

  // Safe assignments with fallbacks
  els.avatar.src = avatarUrl;
  els.fullName.textContent = fullName;
  els.roleBadge.textContent = profile?.account_type || user.user_metadata?.account_type || 'Member';

  if (els.displayFullName) els.displayFullName.textContent = fullName;
  if (els.email) els.email.textContent = profile?.email || user.email || '—';
  if (els.phone) els.phone.textContent = profile?.phone || '—';
  if (els.dob) {
    els.dob.textContent = profile?.date_of_birth 
      ? new Date(profile.date_of_birth).toLocaleDateString() 
      : '—';
  }
  if (els.accountType) els.accountType.textContent = profile?.account_type || 'User';

  // Bio
  const bioText = profile?.bio || 'No bio yet. Tell others about yourself...';
  if (els.bioDisplay) els.bioDisplay.textContent = bioText;
  if (els.bioInput) els.bioInput.value = profile?.bio || '';

  // Cover
  const coverImg = document.querySelector('.cover-photo img');
  if (coverImg) coverImg.src = coverUrl;

  // Fake rating...
  const rating = (Math.random() * 1 + 4).toFixed(1);
  if (els.averageRating) els.averageRating.textContent = rating;
  if (els.stars) {
    els.stars.textContent = '★'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating));
  }
  if (els.ratingCount) {
    els.ratingCount.textContent = `Based on ${Math.floor(Math.random()*80 + 20)} reviews`;
  }
}

    // ── Edit Bio ───────────────────────────────────────
    els.editBioBtn.addEventListener('click', () => {
      els.bioDisplay.classList.add('hide');
      els.bioEditArea.classList.add('show');
      els.editBioBtn.style.display = 'none';
    });

    els.cancelBioBtn.addEventListener('click', () => {
      els.bioDisplay.classList.remove('hide');
      els.bioEditArea.classList.remove('show');
      els.editBioBtn.style.display = 'block';
    });

    els.saveBioBtn.addEventListener('click', async () => {
      const bio = els.bioInput.value.trim();
      if (bio.length > 300) return alert('Bio too long (max 300 chars)');

      const { error } = await supabase
        .from('profiles')
        .update({ bio })
        .eq('id', currentUserId);

      if (error) return alert('Failed to save bio');

      els.bioDisplay.textContent = bio || 'No bio yet...';
      els.bioDisplay.classList.remove('hide');
      els.bioEditArea.classList.remove('show');
      els.editBioBtn.style.display = 'block';
      alert('Bio saved!');
    });

    // ── Edit Profile (name, phone, dob) ─────────────────
    els.editProfileBtn.addEventListener('click', () => {
      els.infoSection.classList.add('edit-mode');
      els.editProfileBtn.style.display = 'none';
      els.saveProfileBtn.style.display = 'inline-block';
      els.cancelProfileBtn.style.display = 'inline-block';

      els.editFullName.value = els.displayFullName.textContent;
      els.editPhone.value = els.phone.textContent === '—' ? '' : els.phone.textContent;
      els.editDob.value = els.dob.textContent === '—' ? '' : new Date(els.dob.textContent).toISOString().split('T')[0];
    });

    els.cancelProfileBtn.addEventListener('click', () => {
      els.infoSection.classList.remove('edit-mode');
      els.editProfileBtn.style.display = 'inline-block';
      els.saveProfileBtn.style.display = 'none';
      els.cancelProfileBtn.style.display = 'none';
    });

    els.saveProfileBtn.addEventListener('click', async () => {
      const updates = {
        full_name: els.editFullName.value.trim() || null,
        phone: els.editPhone.value.trim() || null,
        date_of_birth: els.editDob.value || null
      };

      const { error } = await supabase
        .from('profiles')
        .update(updates)
        .eq('id', currentUserId);

      if (error) return alert('Failed to save profile');

      // Update display
      els.displayFullName.textContent = updates.full_name || '—';
      els.fullName.textContent = updates.full_name || els.fullName.textContent;
      els.phone.textContent = updates.phone || '—';
      els.dob.textContent = updates.date_of_birth ? new Date(updates.date_of_birth).toLocaleDateString() : '—';

      els.infoSection.classList.remove('edit-mode');
      els.editProfileBtn.style.display = 'inline-block';
      els.saveProfileBtn.style.display = 'none';
      els.cancelProfileBtn.style.display = 'none';

      alert('Profile updated!');
    });

    // ── Avatar Upload ───────────────────────────────────
    els.avatarInput.addEventListener('change', async e => {
      const file = e.target.files?.[0];
      if (!file) return;

      if (file.size > 4*1024*1024) return alert('Image too large (max 4MB)');

      const ext = file.name.split('.').pop();
      const path = `avatars/${currentUserId}.${ext}`;

      const { error: uploadErr } = await supabase.storage
        .from('avatars')
        .upload(path, file, { upsert: true });

      if (uploadErr) return alert('Upload failed: ' + uploadErr.message);

      const { data: { publicUrl } } = supabase.storage.from('avatars').getPublicUrl(path);

      els.avatar.src = publicUrl;

      await supabase.from('profiles').update({ avatar_url: publicUrl }).eq('id', currentUserId);
      alert('Avatar updated!');
    });

    // ── Cover Upload ────────────────────────────────────
    els.coverInput.addEventListener('change', async e => {
      const file = e.target.files?.[0];
      if (!file) return;

      if (file.size > 6*1024*1024) return alert('Cover image too large (max 6MB)');

      const ext = file.name.split('.').pop();
      const path = `covers/${currentUserId}.${ext}`;

      const { error } = await supabase.storage
        .from('covers')
        .upload(path, file, { upsert: true });

      if (error) return alert('Failed: ' + error.message);

      const { data: { publicUrl } } = supabase.storage.from('covers').getPublicUrl(path);

      document.querySelector('.cover-photo img').src = publicUrl;

      await supabase.from('profiles').update({ cover_url: publicUrl }).eq('id', currentUserId);
      alert('Cover photo updated!');
    });

    // Load profile when page opens
    loadProfile();

els.logoutBtn = document.getElementById('logoutBtn');  // Add to your els object if you want consistency

document.getElementById('logoutBtn').addEventListener('click', async () => {
  if (!confirm('Are you sure you want to log out?')) return;

  const { error } = await supabase.auth.signOut();

  if (error) {
    console.error('Logout error:', error);
    alert('Logout failed: ' + error.message);
    return;
  }

  // Optional: Clear any local data if needed
  // localStorage.clear();  // ← only if you want to wipe everything

  alert('Logged out successfully!');
  window.location.replace('login.html');  // Redirect to login (change if your login page is named differently)
});
